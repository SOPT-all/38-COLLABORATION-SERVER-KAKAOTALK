# 로컬 개발용 MySQL 컨테이너 정의
# `docker-compose up -d` - 동일한 MySQL 환경을 모두 띄울 수 있음
# 운영(prod) 환경에는 영향 없음 — AWS RDS 사용 예정

services:
  # 띄울 컨테이너 목록. 지금은 mysql 하나.
  mysql:
    image: mysql:8.0 # Docker Hub의 공식 mysql 이미지, 8.0 태그
    container_name: kakaotalk-mysql # `docker ps`에서 보일 컨테이너 이름
    restart: unless-stopped # OS 재부팅 후 자동 시작 (사용자가 명시적으로 stop 안 한 한)

    # 컨테이너 시작 시 MySQL이 자동으로 사용자/DB를 만들도록 환경변수 주입
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword       # root 계정 비번 (로컬 컨테이너 한정 — 운영 비번 X)
      MYSQL_DATABASE: kakaotalk               # 시작 시 자동 생성될 데이터베이스 이름
      MYSQL_USER: kakaotalk                   # 일반 사용자 계정명 (Spring Boot가 사용)
      MYSQL_PASSWORD: kakaotalk1234           # 일반 사용자 비번. kakaotalk DB에 모든 권한 자동 부여
      TZ: Asia/Seoul                          # 컨테이너 타임존을 한국 시간으로 통일

    # 호스트(개발자 PC)의 3306 포트와 컨테이너 내부 3306을 연결.
    # → Spring Boot가 jdbc:mysql://localhost:3306/... 로 접속 가능
    ports:
      - "3306:3306"

    # MySQL 시작 시 추가로 적용할 옵션
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

    # 데이터를 컨테이너 외부 named volume에 저장.
    # 컨테이너를 지웠다 다시 띄워도 (down → up) 데이터 유지됨.
    volumes:
      - kakaotalk-mysql-data:/var/lib/mysql

# 위에서 사용한 named volume 선언. 실제 디스크 위치는 Docker(OrbStack)가 관리.
volumes:
  kakaotalk-mysql-data:
