name: CD

# main 브랜치에 반영된 코드를 운영 서버에 자동 배포한다.
on:
  push:
    branches:
      - main
  workflow_dispatch:

# GHCR에 Docker 이미지를 push하기 위한 최소 권한이다.
permissions:
  contents: read
  packages: write

# 같은 브랜치에서 중복 배포가 실행되면 이전 실행을 취소한다.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  DEPLOY_PATH: /home/ubuntu/kakaotalk-server

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build JAR
        run: ./gradlew clean bootJar --no-daemon

      - name: Set Docker image name
        id: image
        run: |
          IMAGE_NAME="${GITHUB_REPOSITORY,,}"
          echo "name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "image=${REGISTRY}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.image }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Copy production compose file
        run: |
          ssh "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" "mkdir -p ${DEPLOY_PATH}"
          scp docker-compose.prod.yml \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:${DEPLOY_PATH}/docker-compose.prod.yml"

      - name: Deploy on EC2
        env:
          DOCKER_IMAGE: ${{ steps.image.outputs.image }}:latest
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ssh "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "cd ${DEPLOY_PATH} && \
            echo '${GHCR_TOKEN}' | docker login ${REGISTRY} -u '${{ github.actor }}' --password-stdin && \
            DOCKER_IMAGE='${DOCKER_IMAGE}' docker compose -f docker-compose.prod.yml pull && \
            DOCKER_IMAGE='${DOCKER_IMAGE}' docker compose -f docker-compose.prod.yml up -d && \
            docker image prune -f"
