name: 'docs: 문서 작업'
description: '문서 작성 및 수정 관련 이슈를 생성할 때 사용하는 템플릿입니다'
title: '[docs] '
labels: ['docs']
body:
  - type: textarea
    attributes:
      label: 📄 Description
      description: 작성하거나 수정할 문서와 작업 배경을 작성해 주세요.
      placeholder: 어떤 문서를 왜 작성하거나 수정해야 하는지 구체적으로 작성해주세요.
    validations:
      required: true
  - type: textarea
    attributes:
      label: ✅ Tasks
      description: 문서 작업을 위한 세부 작업 목록을 체크리스트로 작성해주세요.
      placeholder: |-
        - [ ] 관련 자료 확인
        - [ ] 문서 작성 또는 수정
        - [ ] 문서 내용 검토
    validations:
      required: true
  - type: textarea
    attributes:
      label: 📎 ETC
      description: 참고 자료나 추가 정보가 있다면 작성해주세요.
      placeholder: Notion 문서, 회의록, 참고 링크 등
